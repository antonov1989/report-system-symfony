nelmio_api_doc:
    documentation:
        info:
            title: Finance Tracker API
            description: REST API for a personal finance / expense tracker
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - Bearer: []
    areas: # filter documented routes
        path_patterns:
            - ^/api(?!/doc$)
